name: Backend CI (Raspberry Pi)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'raspberry-pi/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'raspberry-pi/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 libsqlite3-dev
    
    - name: Install Python dependencies
      working-directory: ./raspberry-pi
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio flake8 black isort mypy
    
    - name: Run Black formatter check
      working-directory: ./raspberry-pi
      run: |
        black --check src/ tests/ --line-length=100
    
    - name: Run isort check
      working-directory: ./raspberry-pi
      run: |
        isort --check-only src/ tests/ --profile black
    
    - name: Run Flake8 linter
      working-directory: ./raspberry-pi
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    
    - name: Run MyPy type checker
      working-directory: ./raspberry-pi
      run: |
        mypy src/ --ignore-missing-imports || true
    
    - name: Create test database
      working-directory: ./raspberry-pi
      run: |
        mkdir -p data
        sqlite3 data/detections.db < database/schema.sql
    
    # Hasta que no haya tests no tiene sentido que se ejecute
    #- name: Run tests
    #  working-directory: ./raspberry-pi
    #  env:
    #    PYTHONPATH: .
    #  run: |
    #    pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
    
    #- name: Upload coverage
    #  uses: codecov/codecov-action@v3
    #  with:
    #    file: ./raspberry-pi/coverage.xml
    #    flags: backend
    #    name: backend-coverage
    
  # Validamos la sintaxis de la base de datos y la configuración de Python
  validate-config:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Validate database schema
      working-directory: ./raspberry-pi
      run: |
        sqlite3 :memory: < database/schema.sql
    
    - name: Validate Python config
      working-directory: ./raspberry-pi
      run: |
        python3 -c "from src.config import AppConfig; config = AppConfig.load_default();"

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run safety check
      working-directory: ./raspberry-pi
      run: |
        pip install safety
        safety check -r requirements.txt --continue-on-error || true
    
    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\s*=\s*['\"][^'\"]\+" raspberry-pi/src/ || \
           grep -r "api_key\s*=\s*['\"][^'\"]\+" raspberry-pi/src/ || \
           grep -r "secret\s*=\s*['\"][^'\"]\+" raspberry-pi/src/; then
          echo "Potential hardcoded secrets found"
          exit 1
        fi
        echo "No hardcoded secrets detected"

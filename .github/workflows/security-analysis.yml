name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  bandit-python:
    name: Bandit Python Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]
    
    - name: Run Bandit
      working-directory: ./raspberry-pi
      continue-on-error: true  
      run: |
        bandit -r src/ -f json -o ../bandit-report.json -ll -i || true
        bandit -r src/ -ll -s B104 || true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
        retention-days: 30

  eslint-javascript:
    name: ESLint JavaScript Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-interface/package-lock.json
    
    - name: Install dependencies
      working-directory: ./web-interface
      run: npm ci
    
    - name: Install ESLint security plugin
      working-directory: ./web-interface
      run: npm install --save-dev eslint-plugin-security
    
    - name: Run ESLint security scan
      working-directory: ./web-interface
      continue-on-error: true
      run: |
        npx eslint src/ --ext .js,.jsx --plugin security --format json --output-file ../eslint-report.json || true
        npx eslint src/ --ext .js,.jsx --plugin security || true
    
    - name: Upload ESLint report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: eslint-security-report
        path: eslint-report.json
        retention-days: 30

  dependency-check:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Python Safety Check
      working-directory: ./raspberry-pi
      continue-on-error: true
      run: |
        pip install safety
        safety check -r requirements.txt --json --output ../safety-report.json || true
        safety check -r requirements.txt || true
    
    - name: Upload Safety report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: safety-vulnerabilities-report
        path: safety-report.json
        retention-days: 30
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: JavaScript npm audit
      working-directory: ./web-interface
      continue-on-error: true
      run: |
        npm audit --json > ../npm-audit-report.json || true
        npm audit || true
    
    - name: Upload npm audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-audit-report
        path: npm-audit-report.json
        retention-days: 30

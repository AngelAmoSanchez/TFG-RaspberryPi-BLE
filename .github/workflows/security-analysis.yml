name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  bandit-python:
    name: Bandit Python Security
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Bandit
      run: pip install bandit[toml]
    
    - name: Run Bandit
      run: |
        bandit -r raspberry-pi/src/ -f json -o bandit-report.json || true
        bandit -r raspberry-pi/src/ -ll
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
        retention-days: 30

  dependency-check:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Python Safety Check
      run: |
        pip install safety
        safety check -r raspberry-pi/requirements.txt --json || true
